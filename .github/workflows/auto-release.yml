name: Auto Release

on:
  push:
    branches: [main]
    paths:
      - 'version.txt'
  workflow_dispatch:
    inputs:
      draft:
        description: 'Create as draft release?'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  actions: read

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.event.head_commit.message, 'v'))
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from version.txt
        id: version
        run: |
          VERSION=$(cat version.txt | tr -d '\r\n' | xargs)
          echo "Full version: $VERSION"

          # Release name = version without BETA/ALPHA/RC/STABLE prefix + [bot]
          # Example: "BETA 2.3.22-beta" → "2.3.22-beta [bot]"
          NAME=$(echo "$VERSION" | sed -E 's/^(BETA|ALPHA|RC|STABLE)\s+//i')
          NAME="${NAME} [bot]"
          # Tag = same stripped form (no BETA/ALPHA/RC prefix) + _bot, spaces → _
          # Example: "BETA 2.3.22-beta" → "2.3.22-beta_bot"
          TAG=$(echo "$NAME" | sed 's/ \[bot\]$//' | sed 's/ /_/g')_bot
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "full=$VERSION" >> $GITHUB_OUTPUT

          # Determine prerelease flag.
          # Stable release (prerelease=false) ONLY if version ENDS with "-stable".
          # Anything else (BETA, ALPHA, RC, plain numbers, etc.) → pre-release (prerelease=true).
          if echo "$VERSION" | grep -qiE '\-stable$'; then
            echo "prerelease=false" >> $GITHUB_OUTPUT
          else
            echo "prerelease=true" >> $GITHUB_OUTPUT
          fi

      - name: Generate release notes
        id: notes
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION_FULL="${{ steps.version.outputs.full }}"

          # Try to extract the relevant changelog section
          CHANGELOG_SECTION=""
          if [ -f CHANGELOG.md ]; then
            # Strip ONLY the lifecycle prefix (BETA/ALPHA/RC/STABLE), KEEP the suffix.
            # CHANGELOG.md headers are now formatted as "## [2.3.33-beta]" (no BETA prefix).
            CHANGELOG_SEARCH=$(echo "$VERSION_FULL" | sed -E 's/^(BETA|ALPHA|RC|STABLE)\s+//i')
            # Extract section between this version header and the next one.
            # Use string ops + a regex without bracket chars (avoids awk's [ ] conflation).
            CHANGELOG_SECTION=$(awk -v search="${CHANGELOG_SEARCH}" '
              BEGIN { flag=0; searchlen = length(search) }
              {
                line = $0
                # Detect header lines via string prefix (no regex brackets)
                if (substr(line, 1, 4) == "## [") {
                  # Find closing "]"
                  ridx = length(line)
                  while (ridx > 0 && substr(line, ridx, 1) != "]") ridx--
                  if (ridx > 4) {
                    content = substr(line, 5, ridx - 5)
                    if (content == search) { flag = 1; print; next }
                    # tolerate -beta/alpha/rc[N] suffix
                    if (length(content) > searchlen) {
                      suf = substr(content, searchlen + 1)
                      if (suf == "-beta" || suf == "-alpha" || suf ~ "^-rc[0-9]+$") { flag = 1; next }
                    }
                  }
                  flag = 0
                  next
                }
                if (flag) print
              }
            ' CHANGELOG.md | head -30)
          fi

          # Build release body
          cat <<EOF > /tmp/release_body.md
          ## 🚀 Automated Release — ${VERSION_FULL}

          This release was automatically generated by the **Auto Release** CI/CD workflow.

          ### 📦 Release Details
          - **Version:** ${VERSION_FULL}
          - **Tag:** ${TAG}
          - **Commit:** [$(git rev-parse --short HEAD)](https://github.com/${{ github.repository }}/commit/$(git rev-parse HEAD))
          - **Date:** $(date -u +"%Y-%m-%d %H:%M UTC")
          - **Trigger:** ${{ github.event_name == 'workflow_dispatch' && 'Manual (workflow_dispatch)' || 'Push to main (version.txt changed)' }}
          - **Triggered by:** @${{ github.actor }}

          ### 📝 Recent Changes
          $( [ -n "$CHANGELOG_SECTION" ] && echo "$CHANGELOG_SECTION" || echo "_See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details._" )

          ---

          > 🤖 This is an automated release created by the CI/CD pipeline.  
          > Repository: [${{ github.repository }}](https://github.com/${{ github.repository }})  
          > Workflow: [Auto Release](https://github.com/${{ github.repository }}/actions/workflows/auto-release.yml)
          EOF

          cat /tmp/release_body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          body_path: /tmp/release_body.md
          draft: ${{ github.event.inputs.draft || false }}
          prerelease: ${{ steps.version.outputs.prerelease }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
