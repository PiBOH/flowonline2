name: Auto Release

on:
  push:
    branches: [main]
    paths:
      - 'version.txt'
  workflow_dispatch:
    inputs:
      draft:
        description: 'Create as draft release?'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  actions: read

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.event.head_commit.message, 'v'))
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from version.txt
        id: version
        run: |
          VERSION=$(cat version.txt | tr -d '\r\n' | xargs)
          echo "Full version: $VERSION"

          # Tag = full version.txt content + _[bot], spaces replaced with underscores
          # Example: "BETA 2.3.22-beta" → "BETA_2.3.22-beta_[bot]"
          TAG=$(echo "${VERSION}_[bot]" | sed 's/ /_/g')
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "full=$VERSION" >> $GITHUB_OUTPUT

          # Determine prerelease flag
          if echo "$VERSION" | grep -qiE 'alpha|beta|rc[0-9]*'; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate release notes
        id: notes
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION_FULL="${{ steps.version.outputs.full }}"

          # Try to extract the relevant changelog section
          CHANGELOG_SECTION=""
          if [ -f CHANGELOG.md ]; then
            # Strip suffix (-alpha, -beta, -rc*) to match CHANGELOG headers like "## [BETA 2.3.22]"
            CHANGELOG_SEARCH=$(echo "$VERSION_FULL" | sed -E 's/-(alpha|beta|rc[0-9]*)$//i')
            # Extract section between this version header and the next one
            CHANGELOG_SECTION=$(awk "/## \[${CHANGELOG_SEARCH}\]/{flag=1; next} /## \[/{flag=0} flag" CHANGELOG.md | head -30)
          fi

          # Build release body
          cat <<EOF > /tmp/release_body.md
          ## 🚀 Automated Release — ${VERSION_FULL}

          This release was automatically generated by the **Auto Release** CI/CD workflow.

          ### 📦 Release Details
          - **Version:** ${VERSION_FULL}
          - **Tag:** ${TAG}
          - **Commit:** [$(git rev-parse --short HEAD)](https://github.com/${{ github.repository }}/commit/$(git rev-parse HEAD))
          - **Date:** $(date -u +"%Y-%m-%d %H:%M UTC")
          - **Trigger:** ${{ github.event_name == 'workflow_dispatch' && 'Manual (workflow_dispatch)' || 'Push to main (version.txt changed)' }}
          - **Triggered by:** @${{ github.actor }}

          ### 📝 Recent Changes
          $( [ -n "$CHANGELOG_SECTION" ] && echo "$CHANGELOG_SECTION" || echo "_See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details._" )

          ---

          > 🤖 This is an automated release created by the CI/CD pipeline.  
          > Repository: [${{ github.repository }}](https://github.com/${{ github.repository }})  
          > Workflow: [Auto Release](https://github.com/${{ github.repository }}/actions/workflows/auto-release.yml)
          EOF

          cat /tmp/release_body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.full }} [bot]
          body_path: /tmp/release_body.md
          draft: ${{ github.event.inputs.draft || false }}
          prerelease: ${{ steps.version.outputs.prerelease }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
